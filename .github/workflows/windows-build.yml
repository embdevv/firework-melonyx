name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 'a42af01b72c28a8e1d7b48107b8b95b176e77ac0'

    - name: Install dependencies
      run: vcpkg install glfw3:x64-windows glew:x64-windows glm:x64-windows opengl:x64-windows

    - name: Configure CMake
      run: >
        cmake -B build
        "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
        -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Copy shaders next to executable
      run: |
        copy shaders\particle.vert build\Release\particle.vert
        copy shaders\particle.frag build\Release\particle.frag

    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: windows-executable
        path: |
          build/Release/GDPHYSX_Phase1.exe
          build/Release/particle.vert
          build/Release/particle.frag
